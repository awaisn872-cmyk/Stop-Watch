<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Watch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <div class="stopwatch">
        <h1 style="color:antiquewhite;">Stop Watch</h1>
        <h1 id="displytime">00:00:00</h1>

        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
